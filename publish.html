<!DOCTYPE html>
<html lang="en">
<head>s
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publishing to Wikipedia…</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #f0ede6; --paper: #faf8f3; --ink: #1a1714; --ink2: #5a5650; --border: #c8c4bb; }
  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 24px;
    text-align: center;
  }
  #status {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #detail {
    font-size: 11px;
    color: var(--ink2);
    line-height: 1.8;
    max-width: 380px;
  }
  #spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #spinner.done  { animation: none; border-color: #22c55e; border-top-color: #22c55e; }
  #spinner.error { animation: none; border-color: #ef4444; border-top-color: #ef4444; }
  #retry-btn {
    display: none;
    margin-top: 8px;
    padding: 8px 20px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--bg);
    border: none;
    cursor: pointer;
  }
  a { color: var(--ink); }
</style>
</head>
<body>
  <div id="spinner"></div>
  <div id="status">Loading canvas…</div>
  <div id="detail"></div>
  <button id="retry-btn" onclick="run()">Try again</button>

<script>
const statusEl = document.getElementById('status');
const detailEl = document.getElementById('detail');
const spinner  = document.getElementById('spinner');
const retryBtn = document.getElementById('retry-btn');

const API = 'https://en.wikipedia.org/w/api.php';
const ORIGIN = encodeURIComponent(location.origin);

function setError(msg, hint) {
  statusEl.textContent = 'Error';
  detailEl.innerHTML   = msg + (hint ? '<br><br>' + hint : '');
  spinner.className    = 'error';
  retryBtn.style.display = 'inline-block';
}

async function run() {
  retryBtn.style.display = 'none';
  spinner.className = '';
  statusEl.textContent = 'Loading canvas\u2026';
  detailEl.textContent = '';

  // --- 1. Read payload from localStorage (written by wiki-paint.html) ---
  const raw = localStorage.getItem('wiki-paint-pending');
  if (!raw) {
    setError(
      'No pending publish found.',
      'Go back to the paint app and click \u2191\u00a0Publish\u00a0to\u00a0Wikipedia again.'
    );
    return;
  }

  let wikitext, page;
  try {
    ({ wikitext, page } = JSON.parse(raw));
  } catch(e) {
    setError('Failed to read canvas data: ' + e.message);
    return;
  }

  // --- 2. Check Wikipedia login + get CSRF token ---
  statusEl.textContent = 'Checking Wikipedia login\u2026';
  let meta;
  try {
    const res = await fetch(
      `${API}?action=query&meta=userinfo|tokens&type=csrf&format=json&origin=${ORIGIN}`,
      { credentials: 'include' }
    );
    meta = await res.json();
  } catch(e) {
    setError('Could not reach Wikipedia: ' + e.message);
    return;
  }

  const userinfo = meta?.query?.userinfo;
  if (!userinfo || userinfo.anon !== undefined) {
    // Not logged in — prompt user, keep localStorage so they can retry
    setError(
      'You\u2019re not logged in to Wikipedia.',
      '<a href="https://en.wikipedia.org/w/index.php?title=Special:UserLogin" target="_blank">' +
      'Log in to Wikipedia \u2197</a><br>then click Try again below.'
    );
    return;
  }

  const csrfToken = meta.query.tokens.csrftoken;

  // --- 3. Submit the edit ---
  statusEl.textContent = 'Saving to Wikipedia\u2026';
  detailEl.textContent = 'Logged in as ' + userinfo.name + '. Saving to ' + page + '\u2026';

  let result;
  try {
    const body = new URLSearchParams({
      action:  'edit',
      title:   page,
      text:    wikitext,
      summary: 'Updated Wiki Paint canvas snapshot',
      token:   csrfToken,
      format:  'json'
    });
    const res = await fetch(`${API}?origin=${ORIGIN}`, {
      method: 'POST',
      body,
      credentials: 'include'
    });
    result = await res.json();
  } catch(e) {
    setError('Network error while saving: ' + e.message);
    return;
  }

  if (result?.edit?.result === 'Success') {
    // Success — now safe to clear localStorage
    localStorage.removeItem('wiki-paint-pending');
    spinner.className    = 'done';
    statusEl.textContent = 'Published!';
    const pageUrl = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(page).replace(/%3A/g, ':').replace(/%2F/g, '/');
    detailEl.innerHTML = 'Saved to <a href="' + pageUrl + '" target="_blank">' + page + ' \u2197</a>';
  } else {
    const errInfo = result?.error ? result.error.code + ': ' + result.error.info : JSON.stringify(result);
    setError('Wikipedia rejected the edit.', errInfo);
  }
}

run();
</script>
</body>
</html>
